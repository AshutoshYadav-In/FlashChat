# Render Blueprint: https://render.com/docs/blueprint-spec
# Deploys the Node backend. Set MONGO_URI and CLIENT_ORIGIN in the dashboard (sync: false).

services:
  - type: web
    name: flashchat-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
